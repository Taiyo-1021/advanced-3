<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Rhythm — Advanced Pronunciation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#06091a;overflow:hidden;height:100vh;width:100vw}
#app{width:100vw;height:100vh;display:flex;flex-direction:column}
#progress{position:fixed;top:0;left:0;height:5px;background:linear-gradient(90deg,#F57F17,#FFD54F);z-index:99;transition:width .3s ease;border-radius:0 3px 3px 0}
#slides{flex:1;position:relative;overflow:hidden;min-height:0}
.slide{position:absolute;inset:0;display:none;flex-direction:column}
.slide.active{display:flex}

/* NAV */
#nav{height:48px;background:#060714;display:flex;align-items:center;justify-content:center;gap:14px;flex-shrink:0;border-top:1px solid rgba(255,255,255,.08)}
#nav button{background:rgba(255,255,255,.1);border:none;color:#fff;font-size:13px;padding:6px 20px;border-radius:20px;cursor:pointer;transition:background .2s;font-family:inherit;letter-spacing:.3px}
#nav button:hover{background:rgba(255,255,255,.22)}
#nav button:disabled{opacity:.25;cursor:default}
#counter{color:rgba(255,255,255,.45);font-size:12px;min-width:60px;text-align:center}

/* SHARED */
.s-head{padding:12px 30px;font-size:16px;font-weight:700;color:#fff;display:flex;align-items:center;gap:10px;flex-shrink:0;letter-spacing:.2px}
.badge{background:rgba(255,255,255,.16);border-radius:20px;padding:3px 11px;font-size:11px;font-weight:600}
.s-body{flex:1;display:flex;padding:0 26px 12px;gap:22px;min-height:0;overflow:hidden}
.student-badge{background:#F57F17;color:#fff;border-radius:20px;padding:4px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;flex-shrink:0}
.dum{color:#F57F17;font-weight:900}

/* BEAT BOXES */
.beat-da{display:inline-block;background:#e0e0e0;color:#666;border-radius:6px;padding:2px 7px;font-size:clamp(10px,1.1vw,13px);font-weight:600;margin:1px}
.beat-dum{display:inline-block;background:#F57F17;color:#fff;border-radius:6px;padding:3px 10px;font-size:clamp(12px,1.3vw,16px);font-weight:900;margin:1px}
.beat-row{display:flex;align-items:center;gap:4px;flex-wrap:wrap}

/* TITLE */
.title-slide{background:linear-gradient(140deg,#06091a 0%,#1f1100 55%,#06091a 100%);align-items:center;justify-content:center;text-align:center}
.title-slide h1{font-size:clamp(30px,5vw,66px);font-weight:900;color:#fff;line-height:1;letter-spacing:-2px}
.title-slide h1 em{font-style:normal;background:linear-gradient(90deg,#F57F17,#FFD54F);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.title-sub{font-size:clamp(13px,1.7vw,19px);color:rgba(255,255,255,.6);margin-top:12px}
.goal-box{margin-top:22px;background:rgba(245,127,23,.09);border:1.5px solid rgba(245,127,23,.35);border-radius:16px;padding:16px 28px;display:inline-block;text-align:left}
.goal-box p{color:#FFE0B2;font-size:clamp(13px,1.5vw,17px);line-height:1.75}
.adv-badge{display:inline-block;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 16px;font-size:clamp(11px,1.2vw,13px);color:rgba(255,255,255,.5);margin-bottom:14px;letter-spacing:1px;text-transform:uppercase}

/* WARM-UP */
.warmup-slide{background:#fff;flex-direction:column}
.warmup-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 40px;gap:18px}
.warmup-prompt{background:#FFF8E1;border-left:5px solid #F57F17;border-radius:0 14px 14px 0;padding:18px 26px;font-size:clamp(14px,1.8vw,20px);font-weight:600;color:#E65100;max-width:820px;width:100%;line-height:1.5}
.warmup-pairs{display:flex;gap:16px;max-width:820px;width:100%}
.warmup-pair{border-radius:14px;padding:14px 20px;flex:1;text-align:center;border:2px solid}
.wp-jp{font-size:clamp(16px,2.2vw,26px);font-weight:900;letter-spacing:4px}
.wp-en{font-size:clamp(18px,2.5vw,30px);font-weight:900}
.wp-label{font-size:clamp(10px,1.1vw,12px);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-top:4px;opacity:.7}
.warmup-q{background:#F5F5F5;border-radius:10px;padding:10px 16px;font-size:clamp(12px,1.4vw,15px);color:#555;border:1.5px solid #e0e0e0;max-width:820px;width:100%}
.teacher-note{background:#FFF3E0;border:1px solid #FFB74D;border-radius:10px;padding:10px 18px;font-size:clamp(11px,1.25vw,14px);color:#E65100;max-width:820px;width:100%;line-height:1.6}

/* KEY CONCEPT */
.concept-slide{background:#fff;flex-direction:column}
.concept-body{flex:1;display:flex;flex-direction:column;gap:14px;padding:14px 26px;min-height:0}
.concept-cols{display:flex;gap:18px;flex:1;min-height:0}
.concept-col{border-radius:14px;padding:16px 20px;flex:1;display:flex;flex-direction:column;gap:10px}
.cc-num{font-size:clamp(26px,4vw,48px);font-weight:900;line-height:1}
.cc-title{font-size:clamp(14px,1.6vw,20px);font-weight:900;margin-bottom:2px}
.cc-body{font-size:clamp(12px,1.3vw,14px);line-height:1.65;color:#444}
.cc-beats{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.cc-beat-row{display:flex;align-items:center;gap:8px}
.cc-beat-label{font-size:clamp(11px,1.2vw,13px);color:#888;min-width:80px;font-style:italic}
.concept-rule{background:#FFF8E1;border-radius:12px;padding:11px 18px;font-size:clamp(12px,1.3vw,15px);color:#E65100;font-weight:600;text-align:center;flex-shrink:0}

/* SPOT IT */
.spot-slide{background:#f8f9fa;flex-direction:column}
.spot-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1;overflow-y:auto}
.spot-box{background:#fff;border-radius:12px;padding:12px 16px;border:1.5px solid #e0e0e0;display:flex;flex-direction:column;gap:6px}
.spot-sent{font-size:clamp(14px,1.7vw,20px);font-weight:700;color:#222;padding:6px 0}
.spot-reveal-btn{align-self:flex-start;background:#F57F17;color:#fff;border:none;border-radius:8px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;transition:background .2s}
.spot-reveal-btn:hover{background:#E65100}
.spot-ans{display:none;background:#FFF8E1;border-radius:8px;padding:10px 12px;display:none;flex-direction:column;gap:6px}
.spot-ans.open{display:flex}
.spot-hint{font-size:clamp(10px,1.1vw,12px);color:#888;line-height:1.5}

/* TRY IT */
.tryit-slide{background:#f8f9fa;flex-direction:column}
.tryit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1;overflow-y:auto}
.tryit-card{background:#fff;border-radius:12px;padding:12px 16px;border:1.5px solid #e0e0e0;display:flex;flex-direction:column;justify-content:center;gap:5px}
.tryit-num{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#F57F17;opacity:.7}
.tryit-sent{font-size:clamp(14px,1.7vw,20px);color:#222;line-height:1.6;font-weight:600}
.tryit-note{font-size:clamp(10px,1.1vw,12px);color:#888;font-style:italic}

/* TRY IT #2 — JP vs EN */
.jpvs-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;flex:1;overflow-y:auto}
.jpvs-card{background:#fff;border-radius:12px;padding:14px 18px;border:1.5px solid #e0e0e0;display:flex;flex-direction:column;gap:8px}
.jpvs-num{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#F57F17;opacity:.7}
.jpvs-row{display:flex;align-items:center;gap:10px}
.jpvs-lang{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;min-width:24px;opacity:.6}
.jpvs-jp{font-size:clamp(16px,2vw,24px);font-weight:700;letter-spacing:6px;color:#555}
.jpvs-jp-note{font-size:clamp(10px,1.1vw,12px);color:#aaa}
.jpvs-en-word{font-size:clamp(18px,2.2vw,28px);font-weight:900;color:#222}
.jpvs-beats{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:2px}
.jpvs-tip{font-size:clamp(10px,1.1vw,12px);color:#F57F17;font-style:italic}

/* ROLE-PLAY */
.roleplay-slide{background:#1a0f00;flex-direction:column}
.rp-body{flex:1;display:flex;flex-direction:column;gap:10px;padding:12px 26px 12px;min-height:0;overflow:hidden}
.rp-scenario{background:rgba(255,255,255,.06);border-radius:12px;padding:10px 18px;font-size:clamp(12px,1.3vw,14px);color:rgba(255,255,255,.75);flex-shrink:0;line-height:1.5}
.rp-cols{display:grid;grid-template-columns:3fr 2fr;gap:14px;flex:1;min-height:0;overflow:hidden}
.rp-col{background:rgba(255,255,255,.04);border-radius:12px;padding:12px 16px;display:flex;flex-direction:column;gap:5px;overflow-y:auto}
.rp-col-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px;flex-shrink:0;color:#FFB74D}
.rp-line{padding:5px 8px;border-radius:8px;display:flex;flex-direction:column;gap:2px}
.rp-line.teacher{background:rgba(255,255,255,.04)}
.rp-line.student{background:rgba(245,127,23,.2);border:1px solid rgba(245,127,23,.35)}
.rp-speaker{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.5}
.rp-text{font-size:clamp(11px,1.35vw,14px);color:#fff;line-height:1.5}
.rp-text .dum{color:#FFB74D}
.rp-tip{background:rgba(245,127,23,.12);border:1px solid rgba(245,127,23,.3);border-radius:10px;padding:8px 14px;font-size:clamp(11px,1.2vw,13px);color:#FFB74D;flex-shrink:0}
.rp-tips-list{display:flex;flex-direction:column;gap:8px;font-size:clamp(11px,1.25vw,13px);color:rgba(255,255,255,.7)}

/* BUILD IT */
.build-slide{background:#fff;flex-direction:column}
.build-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 40px;gap:16px;overflow-y:auto}
.build-prompt{background:#FFF8E1;border-radius:14px;padding:18px 26px;max-width:760px;width:100%;text-align:center}
.build-prompt h2{font-size:clamp(15px,1.9vw,22px);font-weight:800;color:#E65100;margin-bottom:8px}
.build-prompt p{font-size:clamp(12px,1.4vw,16px);color:#F57F17;line-height:1.6}
.build-steps{display:flex;gap:14px;max-width:760px;width:100%}
.build-step{border-radius:12px;padding:14px 18px;flex:1;text-align:center;border:1.5px solid}
.build-step-num{font-size:clamp(22px,3vw,36px);font-weight:900;line-height:1}
.build-step-title{font-size:clamp(12px,1.3vw,15px);font-weight:700;margin-top:4px}
.build-step-ex{font-size:clamp(10px,1.1vw,12px);color:#555;margin-top:6px;line-height:1.5}

/* QUIZ */
.quizq-slide{background:#f8f9fa;flex-direction:column}
.q-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px 14px;width:100%}
.q-box{background:#fff;border-radius:12px;padding:12px 16px;border:1.5px solid #e0e0e0;display:flex;flex-direction:column;gap:5px}
.q-num{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#F57F17;opacity:.8}
.q-text{font-size:clamp(12px,1.3vw,15px);font-weight:600;color:#222;line-height:1.45}
.q-opts{display:flex;flex-direction:column;gap:3px}
.q-opt{font-size:clamp(11px,1.15vw,13px);color:#555;padding:2px 0;line-height:1.4}
.q-reveal-btn{align-self:flex-start;background:#F57F17;color:#fff;border:none;border-radius:8px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;transition:background .2s;margin-top:2px}
.q-reveal-btn:hover{background:#E65100}
.q-ans-reveal{display:none;background:#FFF8E1;border-radius:8px;padding:8px 12px;margin-top:4px}
.q-ans-reveal.open{display:block}
.qr-opts{display:flex;flex-direction:column;gap:3px;margin-bottom:5px}
.qr-opt{font-size:clamp(11px,1.15vw,13px);color:#555;padding:2px 6px;border-radius:5px}
.qr-opt.correct{background:#F57F17;color:#fff;font-weight:700}
.qr-hint{font-size:clamp(10px,1.1vw,12px);color:#E65100;line-height:1.5}
.think-banner{background:#FFF8E1;border-radius:10px;padding:8px 16px;font-size:clamp(12px,1.3vw,14px);color:#E65100;font-weight:600;flex-shrink:0}

/* SUMMARY */
.summary-slide{background:linear-gradient(140deg,#06091a 0%,#1f1100 55%,#06091a 100%);flex-direction:column}
.sum-cards{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.sum-card{border-radius:16px;padding:20px 22px;min-width:180px;max-width:260px;flex:1}
.sum-card-icon{font-size:clamp(26px,3.5vw,42px);margin-bottom:8px}
.sum-card-title{font-size:clamp(13px,1.5vw,18px);font-weight:800;color:#fff;margin-bottom:6px;line-height:1.3}
.sum-card-body{font-size:clamp(11px,1.2vw,13px);color:rgba(255,255,255,.7);line-height:1.5}
.sum-foot{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 22px;font-size:clamp(12px,1.3vw,14px);color:rgba(255,255,255,.6);text-align:center;max-width:720px}

/* FREE CONV */
.freeconv-slide{background:#1a0f00;flex-direction:column}
.fc-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 40px;gap:14px}
.fc-badge{background:rgba(245,127,23,.3);border:1px solid rgba(245,127,23,.5);border-radius:20px;padding:4px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#FFB74D}
.fc-topic{font-size:clamp(22px,3.5vw,46px);font-weight:900;color:#fff;letter-spacing:-1px}
.fc-questions{display:flex;flex-direction:column;gap:8px;width:100%;max-width:720px}
.fc-q{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 16px;font-size:clamp(13px,1.5vw,16px);color:rgba(255,255,255,.8);line-height:1.55}
.fc-note{font-size:clamp(11px,1.2vw,13px);color:rgba(255,255,255,.4);text-align:center;max-width:680px;line-height:1.6}
.fc-teacher{background:rgba(245,127,23,.1);border:1px solid rgba(245,127,23,.25);border-radius:10px;padding:10px 16px;font-size:clamp(11px,1.2vw,13px);color:#FFB74D;max-width:720px;width:100%;line-height:1.6}
</style>
</head>
<body>
<div id="app">
  <div id="progress"></div>
  <div id="slides"></div>
  <div id="nav">
    <button id="prevBtn" onclick="move(-1)">◀ Back</button>
    <span id="counter"></span>
    <button id="nextBtn" onclick="move(1)">Next ▶</button>
  </div>
</div>
<script>
// ═══════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════
const da  = `<span class="beat-da">da</span>`;
const DUM = `<span class="beat-dum">DUM</span>`;

const SPOT = [
  {sent:'Cats eat fish.',
   pattern:`${DUM} ${da} ${DUM}`,
   hint:'2 beats. "eat" is a content verb — stressed. "Cats" and "fish" are nouns — also stressed. No unstressed syllables between them!'},
  {sent:'She bought a new car.',
   pattern:`${da} ${DUM} ${da} ${DUM} ${DUM}`,
   hint:'3 beats in 5 syllables. "she" and "a" are weak. "BOUGHT", "NEW", "CAR" carry the rhythm.'},
  {sent:'I want to go to school.',
   pattern:`${da} ${DUM} ${da} ${DUM} ${da} ${DUM}`,
   hint:'3 beats. "to" appears twice but both are weak — the stress jumps between content words: WANT, GO, SCHOOL.'},
  {sent:"The weather's been really cold.",
   pattern:`${da} ${DUM} ${da} ${DUM} ${da} ${DUM}`,
   hint:'3 beats. "The" and "been" are weak. The rhythm lands on: WEATH-, REAL-, COLD.'},
  {sent:'Can you give me some water?',
   pattern:`${da} ${da} ${DUM} ${da} ${da} ${DUM} ${da}`,
   hint:'2 beats. "can", "you", "me", "some" all fade. The rhythm lands on: GIVE, WA-(ter).'},
  {sent:"She's planning a trip to Japan.",
   pattern:`${da} ${DUM} ${da} ${da} ${DUM} ${da} ${DUM}`,
   hint:'3 beats: PLAN-, TRIP, -PAN. The syllables between get squeezed into the gaps.'},
];

const TRY1 = [
  {sent:'<span class="dum">CATS</span> eat <span class="dum">FISH</span>.',                                        note:'DUM – da – DUM'},
  {sent:'I <span class="dum">WENT</span> to the <span class="dum">STORE</span>.',                                  note:'da – DUM – da – da – DUM'},
  {sent:'She <span class="dum">BOUGHT</span> a <span class="dum">NEW</span> <span class="dum">CAR</span>.',         note:'da – DUM – da – DUM – DUM'},
  {sent:'Can you <span class="dum">GIVE</span> me some <span class="dum">WA</span>ter?',                           note:'da – da – DUM – da – da – DUM–da'},
  {sent:'The <span class="dum">WEATH</span>er\'s been <span class="dum">REAL</span>ly <span class="dum">COLD</span>.',note:'da–DUM–da–da – DUM–da – DUM'},
  {sent:'I <span class="dum">NEED</span> a <span class="dum">NEW</span> <span class="dum">PHONE</span> — mine <span class="dum">BROKE</span>.',note:'da–DUM–da–DUM–DUM – DUM–DUM'},
  {sent:'She\'s <span class="dum">PLAN</span>ning a <span class="dum">TRIP</span> to Ja<span class="dum">-PAN</span>.',note:'da–DUM–da–da–DUM–da–DUM'},
  {sent:'Can you <span class="dum">SEND</span> me the <span class="dum">FILE</span> by Fri<span class="dum">-DAY</span>?',note:'da–da–DUM–da–da–DUM–da–DUM'},
];

const TRY2 = [
  {strong:'I want TO go TO the STORE.',
   natural:'I want <em>tə</em> go <em>tə</em> the STORE.',
   weak:'to → /tə/',
   tip:'Say "tə" quickly — never a full /tuː/ in the middle of a sentence.'},
  {strong:'She IS a BIG FAN OF FASHION.',
   natural:'She\'s <em>ə</em> BIG FAN <em>əv</em> FASHION.',
   weak:'a → /ə/ · of → /əv/',
   tip:'"a" is almost never /eɪ/ in normal speech. It glides into /ə/ — very short.'},
  {strong:'I DID IT FOR YOU AND HIM.',
   natural:'I DID it <em>fə</em> you <em>ən</em> him.',
   weak:'for → /fə/ · and → /ən/',
   tip:'"and" sounds like "un" — the /æ/ disappears completely at normal speed.'},
  {strong:'I CAN DO IT IF YOU CAN.',
   natural:'I <em>kən</em> DO it if you CAN.',
   weak:'can (mid) → /kən/ · can (final) → /kæn/ ← stressed!',
   tip:'Mid-sentence "can" = weak /kən/. At the end (or emphatic) = strong /kæn/. Notice the difference!'},
  {strong:'GIVE ME THE KEY AND THE MAP.',
   natural:'GIVE me <em>ðə</em> KEY <em>ən</em> <em>ðə</em> MAP.',
   weak:'the → /ðə/ · and → /ən/',
   tip:'"the" before a consonant = /ðə/. Only before a vowel does it become /ðiː/ ("the apple").'},
  {strong:'HAVE YOU BEEN TO THE NEW PLACE?',
   natural:'<em>həv</em> you BEEN <em>tə</em> <em>ðə</em> NEW PLACE?',
   weak:'have → /həv/ · to → /tə/ · the → /ðə/',
   tip:'3 weak forms in one sentence! Chain them together quickly and the stressed beats really pop out.'},
];

const ROLEPLAY = [
  {role:'teacher',label:'Teacher',text:'"Good evening. Welcome to the news."'},
  {role:'student',label:'Student',text:'Good <span class="dum">EVE</span>ning. <span class="dum">WEL</span>come to the <span class="dum">NEWS</span>.'},
  {role:'teacher',label:'Teacher',text:'"The weather will be sunny and warm today."'},
  {role:'student',label:'Student',text:'The <span class="dum">WEATH</span>er will be <span class="dum">SUN</span>ny and <span class="dum">WARM</span> to<span class="dum">-DAY</span>.'},
  {role:'teacher',label:'Teacher',text:'"Thousands of people gathered in the square."'},
  {role:'student',label:'Student',text:'<span class="dum">THOU</span>sands of <span class="dum">PEO</span>ple <span class="dum">GATH</span>ered in the <span class="dum">SQUARE</span>.'},
  {role:'teacher',label:'Teacher',text:'"The prime minister announced a new plan."'},
  {role:'student',label:'Student',text:'The <span class="dum">PRIME</span> <span class="dum">MIN</span>ister a<span class="dum">-NOUNCED</span> a <span class="dum">NEW</span> <span class="dum">PLAN</span>.'},
  {role:'teacher',label:'Teacher',text:'"Stocks are up, and the market is strong."'},
  {role:'student',label:'Student',text:'<span class="dum">STOCKS</span> are <span class="dum">UP</span>, and the <span class="dum">MAR</span>ket is <span class="dum">STRONG</span>.'},
];

const QUIZ = [
  {q:'Japanese is ___-timed; English is ___-timed.',
   opts:['a) beat / mora','b) mora / stress','c) pitch / tone','d) stress / mora'],
   ans:1,hint:'Japanese gives each mora (sound unit) equal time — mora-timed. English spaces the STRESSED syllables evenly and squeezes everything in between — stress-timed.'},
  {q:'In "computer", which syllable is stressed?',
   opts:['a) COM','b) PU','c) TER','d) All are equal'],
   ans:1,hint:'com-PU-ter — the middle syllable is stressed. This is why "コンピューター" (5 equal beats) sounds so different from English "computer" (da-DUM-da).'},
  {q:'What happens to unstressed syllables in English?',
   opts:['a) They get louder','b) They become longer','c) They get squeezed and weakened','d) They disappear completely'],
   ans:2,hint:'Unstressed syllables are compressed — shorter, quieter, and often reduced to /ə/ (schwa). They get squeezed into the gaps between stressed beats.'},
  {q:'"クリスマス" has 5 beats. "Christmas" has:',
   opts:['a) 5 beats','b) 4 beats','c) 3 beats','d) 2 beats'],
   ans:3,hint:'"Christmas" = CHRIST-mas — just 2 syllables, 1 strong beat. The 5 Japanese morae compress dramatically into the English stress-timed pattern.'},
  {q:'Which sentence has the most natural English rhythm?',
   opts:['a) "I WANT TO GO TO THE store"','b) "i want to GO to the STORE"','c) "I WANT to go to the STORE"','d) "I want to go to the store" (flat)'],
   ans:2,hint:'"I WANT to go to the STORE" — content words (WANT, STORE) carry the stress. Function words (I, to, the) stay light. This creates the natural da-DUM-da-da-da-DUM pattern.'},
  {q:'The pattern DUM–da–da matches:',
   opts:['a) ba-NA-na','b) com-PU-ter','c) CHOC-o-late','d) in-for-MA-tion'],
   ans:2,hint:'"CHOC-o-late" = DUM–da–da. "Banana" = da-DUM-da. "Computer" = da-DUM-da. "Information" = da-da-DUM-da. Chocolate is the only DUM-first 3-syllable word here.'},
];

function toggleAns(btn,id){
  const el=document.getElementById(id);
  const open=el.classList.toggle('open');
  btn.textContent=open?'▲ 隠す':'▼ リズムを見る';
  if(btn.textContent==='▲ 隠す'&&btn.innerText.includes('答え'))btn.textContent='▲ 隠す';
}

let cur=0,SL=[];
function updateUI(){
  SL=document.querySelectorAll('.slide');
  SL.forEach((s,i)=>s.classList.toggle('active',i===cur));
  document.getElementById('counter').textContent=`${cur+1} / ${SL.length}`;
  document.getElementById('prevBtn').disabled=cur===0;
  document.getElementById('nextBtn').disabled=cur===SL.length-1;
  document.getElementById('progress').style.width=`${((cur+1)/SL.length)*100}%`;
}
function move(d){if(cur+d>=0&&cur+d<SL.length){cur+=d;updateUI();}}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')move(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')move(-1);
});
build();updateUI();
</script>
